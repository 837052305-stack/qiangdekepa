<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强的可怕 - AI工具分享平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #6366f1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: white;
            padding: 0 20px;
        }
        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .navbar-brand { font-size: 1.5rem; font-weight: 700; color: white; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: white;
        }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .tool-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s;
        }
        .tool-card:hover { transform: translateY(-4px); }
        .tool-card-image {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
        }
        .tool-card-content { padding: 20px; }
        .tool-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .tool-card-title { font-size: 1.1rem; font-weight: 600; }
        .tool-card-category {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .tool-card-description { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px; }
        .tool-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { background: var(--bg-color); color: var(--text-secondary); padding: 4px 10px; border-radius: 16px; font-size: 0.8rem; }
        .tool-card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
        .chat-container { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: none; flex-direction: column; z-index: 999; }
        .chat-container.active { display: flex; }
        .chat-header { background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%); color: white; padding: 15px; border-radius: 16px 16px 0 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg-color); }
        .chat-message { margin-bottom: 10px; padding: 10px; background: white; border-radius: 12px; }
        .chat-message.own { background: var(--primary-color); color: white; margin-left: 20%; }
        .chat-message.system { text-align: center; background: transparent; color: var(--text-secondary); font-size: 0.85rem; }
        .chat-input-area { padding: 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 10px; border: 1px solid #e2e8f0; border-radius: 20px; }
        .chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%); color: white; border: none; font-size: 24px; cursor: pointer; z-index: 998; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }

        /* Brand styles */
        .chatgpt { background: linear-gradient(135deg, #10a37f 0%, #0d8c6d 100%); }
        .claude { background: linear-gradient(135deg, #d97757 0%, #c45e3c 100%); }
        .midjourney { background: linear-gradient(135deg, #ff006e 0%, #8338ec 25%, #3a86ff 50%, #06ffa5 75%, #ffbe0b 100%); background-size: 400% 400%; animation: gradient-shift 8s ease infinite; }
        @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .copilot { background: linear-gradient(135deg, #1f2328 0%, #2d333b 100%); }
        .dalle { background: linear-gradient(135deg, #5436da 0%, #7b61ff 100%); }
        .stable { background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); border-bottom: 3px solid #4ade80; }
        .gemini { background: linear-gradient(135deg, #8e75b6 0%, #c58af9 50%, #fbbc04 100%); }
        .bing { background: linear-gradient(135deg, #0078d4 0%, #40e0d0 100%); }
        .runway { background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); }
        .sora { background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%); }
        .pika { background: linear-gradient(135deg, #ff006e 0%, #ff4d00 100%); }
        .wenxin { background: linear-gradient(135deg, #2932e1 0%, #4f5cff 100%); }
        .tongyi { background: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%); }
        .kimi { background: linear-gradient(135deg, #00d4aa 0%, #00a884 100%); }
        .zhipu { background: linear-gradient(135deg, #1a5cff 0%, #0051ff 100%); }
        .notion { background: linear-gradient(135deg, #000000 0%, #2d2d2d 100%); }
        .perplexity { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 2px solid #00d4aa; }
        .leonardo { background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%); }
        .firefly { background: linear-gradient(135deg, #ff0000 0%, #ff6b35 50%, #ffb800 100%); }
        .canva { background: linear-gradient(135deg, #00c4cc 0%, #7d3cff 100%); }
        .cursor { background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); border: 1px solid #333; }
        .huggingface { background: linear-gradient(135deg, #ffde59 0%, #ff914d 100%); }
        .text-gen { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
        .image-gen { background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%); }
        .code-assist { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .video { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
        .default { background: linear-gradient(135deg, #64748b 0%, #475569 100%); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="#" class="navbar-brand">🚀 强的可怕</a>
            <div class="nav-links">
                <a href="#" onclick="showPage('home')">首页</a>
                <a href="#" onclick="openShareModal()">分享工具</a>
                <a href="#" onclick="showPage('favorites')">我的收藏</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>🚀 强的可怕</h1>
            <p>发现、分享、探讨最强大的 AI 工具</p>
        </div>

        <div class="filter-bar">
            <select id="categoryFilter" onchange="filterTools()">
                <option value="all">全部分类</option>
                <option value="文本生成">文本生成</option>
                <option value="图像生成">图像生成</option>
                <option value="代码辅助">代码辅助</option>
                <option value="视频生成">视频生成</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索工具..." onkeyup="filterTools()">
            <button class="btn" onclick="openShareModal()">+ 分享工具</button>
        </div>

        <div id="toolsContainer" class="tools-grid"></div>
    </div>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">分享 AI 工具 🚀</h2>
            <form id="shareForm" onsubmit="submitTool(event)">
                <div class="form-group">
                    <label>工具名称 *</label>
                    <input type="text" id="toolName" required>
                </div>
                <div class="form-group">
                    <label>工具描述 *</label>
                    <textarea id="toolDesc" required rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>工具链接 *</label>
                    <input type="url" id="toolLink" required>
                </div>
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="toolCategory" required>
                        <option value="文本生成">文本生成</option>
                        <option value="图像生成">图像生成</option>
                        <option value="代码辅助">代码辅助</option>
                        <option value="视频生成">视频生成</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标签</label>
                    <input type="text" id="toolTags" placeholder="用逗号分隔">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn" style="background: #e2e8f0; color: #333;" onclick="closeShareModal()">取消</button>
                    <button type="submit" class="btn">发布</button>
                </div>
            </form>
        </div>
    </div>

    <button class="chat-toggle" onclick="toggleChat()">💬</button>

    <div id="chatContainer" class="chat-container">
        <div class="chat-header">
            <div>
                <strong>💬 实时聊天室</strong>
                <div style="font-size: 0.85rem;">🟢 <span id="onlineCount">3</span> 人在线</div>
            </div>
            <button onclick="toggleChat()" style="background: none; border: none; color: white; font-size: 20px;">✕</button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <form class="chat-input-area" onsubmit="sendMessage(event)">
            <input type="text" id="chatInput" class="chat-input" placeholder="输入消息..." required>
            <button type="submit" class="btn" style="padding: 10px 20px;">发送</button>
        </form>
    </div>

    <script>
        const sampleTools = [
            { id: 1, name: 'ChatGPT', description: 'OpenAI 开发的强大对话 AI', link: 'https://chat.openai.com', category: '文本生成', tags: ['AI', '对话'], author: '管理员', likes: [], views: 328 },
            { id: 2, name: 'Claude', description: 'Anthropic 开发的 AI 助手', link: 'https://claude.ai', category: '文本生成', tags: ['AI', '长文本'], author: '管理员', likes: [], views: 186 },
            { id: 3, name: 'Midjourney', description: '高质量艺术图像生成', link: 'https://www.midjourney.com', category: '图像生成', tags: ['绘画', '艺术'], author: '管理员', likes: [], views: 256 },
            { id: 4, name: 'DALL-E 3', description: 'OpenAI 图像生成工具', link: 'https://openai.com/dall-e-3', category: '图像生成', tags: ['绘画', '高清'], author: '管理员', likes: [], views: 145 },
            { id: 5, name: 'GitHub Copilot', description: 'AI 编程助手', link: 'https://github.com/features/copilot', category: '代码辅助', tags: ['编程', 'IDE'], author: '管理员', likes: [], views: 195 },
            { id: 6, name: 'Gemini', description: 'Google 多模态 AI', link: 'https://gemini.google.com', category: '文本生成', tags: ['Google', '多模态'], author: '管理员', likes: [], views: 167 },
            { id: 7, name: 'Stable Diffusion', description: '开源图像生成模型', link: 'https://stability.ai', category: '图像生成', tags: ['开源', '免费'], author: '管理员', likes: [], views: 134 },
            { id: 8, name: 'Runway Gen-2', description: 'AI 视频生成工具', link: 'https://runwayml.com', category: '视频生成', tags: ['视频', '创意'], author: '管理员', likes: [], views: 98 },
            { id: 9, name: 'Kimi', description: '月之暗面中文 AI 助手', link: 'https://kimi.moonshot.cn', category: '文本生成', tags: ['国产', '长文本'], author: '管理员', likes: [], views: 223 },
            { id: 10, name: 'Perplexity', description: 'AI 搜索引擎', link: 'https://www.perplexity.ai', category: '文本生成', tags: ['搜索', '研究'], author: '管理员', likes: [], views: 112 },
            { id: 11, name: 'Notion AI', description: 'Notion 内置 AI 助手', link: 'https://notion.so', category: '文本生成', tags: ['笔记', '写作'], author: '管理员', likes: [], views: 156 },
            { id: 12, name: 'Cursor', description: 'AI 原生代码编辑器', link: 'https://cursor.sh', category: '代码辅助', tags: ['编辑器', 'AI编程'], author: '管理员', likes: [], views: 167 },
            { id: 13, name: 'Hugging Face', description: '最大 AI 模型社区', link: 'https://huggingface.co', category: '文本生成', tags: ['社区', '开源'], author: '管理员', likes: [], views: 245 }
        ];

        let tools = JSON.parse(localStorage.getItem('tools')) || sampleTools;
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let currentUser = '访客' + Math.floor(Math.random() * 1000);
        let chatMessages = JSON.parse(localStorage.getItem('chat')) || [];

        function save() {
            localStorage.setItem('tools', JSON.stringify(tools));
            localStorage.setItem('favorites', JSON.stringify(favorites));
            localStorage.setItem('chat', JSON.stringify(chatMessages));
        }

        function getStyle(name, category) {
            const n = name.toLowerCase();
            if (n.includes('chatgpt')) return 'chatgpt';
            if (n.includes('claude')) return 'claude';
            if (n.includes('midjourney')) return 'midjourney';
            if (n.includes('copilot')) return 'copilot';
            if (n.includes('dalle')) return 'dalle';
            if (n.includes('stable')) return 'stable';
            if (n.includes('gemini')) return 'gemini';
            if (n.includes('bing')) return 'bing';
            if (n.includes('runway')) return 'runway';
            if (n.includes('sora')) return 'sora';
            if (n.includes('kimi')) return 'kimi';
            if (n.includes('wenxin')) return 'wenxin';
            if (n.includes('tongyi')) return 'tongyi';
            if (n.includes('zhipu')) return 'zhipu';
            if (n.includes('notion')) return 'notion';
            if (n.includes('perplexity')) return 'perplexity';
            if (n.includes('leonardo')) return 'leonardo';
            if (n.includes('firefly')) return 'firefly';
            if (n.includes('canva')) return 'canva';
            if (n.includes('cursor')) return 'cursor';
            if (n.includes('hugging')) return 'huggingface';
            if (category === '文本生成') return 'text-gen';
            if (category === '图像生成') return 'image-gen';
            if (category === '代码辅助') return 'code-assist';
            if (category === '视频生成') return 'video';
            return 'default';
        }

        function render(toolsToRender = tools) {
            const container = document.getElementById('toolsContainer');
            if (toolsToRender.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>暂无工具</h3></div>';
                return;
            }
            container.innerHTML = toolsToRender.map(tool => `
                <div class="tool-card">
                    <div class="tool-card-image ${getStyle(tool.name, tool.category)}">${tool.name}</div>
                    <div class="tool-card-content">
                        <div class="tool-card-header">
                            <span class="tool-card-title">${tool.name}</span>
                            <span class="tool-card-category">${tool.category}</span>
                        </div>
                        <p class="tool-card-description">${tool.description}</p>
                        <div class="tool-card-tags">${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                        <div class="tool-card-footer">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">👤 ${tool.author}</span>
                            <div>
                                <button class="action-btn" onclick="toggleFav(${tool.id})">${favorites.includes(tool.id) ? '⭐' : '☆'}</button>
                                <a href="${tool.link}" target="_blank" class="btn" style="padding: 6px 16px; font-size: 0.9rem;">访问</a>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterTools() {
            const cat = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = tools;
            if (cat !== 'all') filtered = filtered.filter(t => t.category === cat);
            if (search) filtered = filtered.filter(t => t.name.toLowerCase().includes(search) || t.description.toLowerCase().includes(search));
            render(filtered);
        }

        function openShareModal() { document.getElementById('shareModal').classList.add('active'); }
        function closeShareModal() { document.getElementById('shareModal').classList.remove('active'); }

        function submitTool(e) {
            e.preventDefault();
            const tool = {
                id: Date.now(),
                name: document.getElementById('toolName').value,
                description: document.getElementById('toolDesc').value,
                link: document.getElementById('toolLink').value,
                category: document.getElementById('toolCategory').value,
                tags: document.getElementById('toolTags').value.split(',').map(t => t.trim()).filter(t => t),
                author: currentUser,
                likes: [],
                views: 0
            };
            tools.unshift(tool);
            save();
            render();
            closeShareModal();
            addChatMsg('system', `${currentUser} 分享了新工具：${tool.name}`);
        }

        function toggleFav(id) {
            const idx = favorites.indexOf(id);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(id);
            save();
            filterTools();
        }

        function showPage(page) {
            if (page === 'favorites') {
                const favTools = tools.filter(t => favorites.includes(t.id));
                document.getElementById('toolsContainer').innerHTML = '<div style="grid-column: 1/-1;"><h2>⭐ 我的收藏</h2></div>';
                render(favTools);
            } else {
                filterTools();
            }
        }

        function toggleChat() { document.getElementById('chatContainer').classList.toggle('active'); }

        function renderChat() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = chatMessages.map(m => `
                <div class="chat-message ${m.type} ${m.user === currentUser ? 'own' : ''}">
                    ${m.type === 'user' ? `<strong>${m.user}</strong><br>` : ''}${m.text}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function addChatMsg(type, text, user = null) {
            chatMessages.push({ type, text, user: user || currentUser, time: Date.now() });
            if (chatMessages.length > 50) chatMessages.shift();
            save();
            renderChat();
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            addChatMsg('user', input.value);
            input.value = '';
        }

        window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); };

        render();
        renderChat();

        setInterval(() => {
            if (Math.random() > 0.9) {
                const msgs = ['你好！', '有人用过 Claude 吗？', '推荐个图像生成工具', '这个网站不错！'];
                const users = ['小明', '小红', '张三'];
                addChatMsg('user', msgs[Math.floor(Math.random() * msgs.length)], users[Math.floor(Math.random() * users.length)]);
            }
        }, 20000);
    </script>
</body>
</html>
